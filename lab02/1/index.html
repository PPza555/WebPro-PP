<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB2-1</title>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        img {
            width: 200px;
            height: 150px;
            border-radius: 8px;
        }

        table {
            border-collapse: separate;
            border-spacing: 8px;
        }

        td {
            background: black;
            color: white;
            font-size: 18px;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>Burger<br><br><img src="img/Burger.jpeg"></td>
            <td>Pizza<br><br><img src="img/Pizza.jpg"></td>
            <td>Tacos<br><br><img src="img/Tacos.jpg"></td>
        </tr>

        <tr>
            <td>Hainanese Chicken Rice<br><br><img src="img/Hainanese Chicken Rice.jpg"></td>
            <td>Som Tum Thai<br><br><img src="img/Som Tum Thai.jpg"></td>
            <td>Thai barbecue<br><br><img src="img/Thai barbecue.jpg"></td>
        </tr>

    </table>
</body>

</html>
